# Run alongside envoy's own compose file to wire this service in as its
# webhook target, e.g. from this directory:
#
#   docker compose -f ../envoy/docker-compose.yaml -f docker-compose.override.yaml \
#       --env-file ./.env up -d --build screening.local
#
# NOTE: with multiple -f files, Compose resolves every relative path (build
# context, volumes) against the FIRST file's directory (envoy/), not each
# file's own location -- hence the "../compliance-service/" prefixes below.
# --env-file is passed explicitly for the same reason: Compose's automatic
# .env lookup also only checks the first file's directory.
#
# Requires a .env file here (copy .env.example) with WEBHOOK_AUTH_KEY_ID /
# WEBHOOK_AUTH_KEY_SECRET matching a key generated via
# `docker compose exec envoy.local envoy hmackey`.
services:
  screening.local:
    build:
      context: ../compliance-service
      dockerfile: ../compliance-service/docker/Dockerfile
    image: compliance/screening
    ports:
      - "8300:8300"
    volumes:
      - ../compliance-service/tmp/data:/data
    environment:
      - WEBHOOK_AUTH_KEY_ID=${WEBHOOK_AUTH_KEY_ID}
      - WEBHOOK_AUTH_KEY_SECRET=${WEBHOOK_AUTH_KEY_SECRET}
      - WEBHOOK_SIGN_REPLIES=${WEBHOOK_SIGN_REPLIES:-false}
      - DATABASE_URL=sqlite:////data/compliance.db

  envoy.local:
    depends_on:
      - screening.local
    environment:
      - TRISA_WEBHOOK_URL=http://screening.local:8300/webhook/travel-rule
      - TRISA_WEBHOOK_AUTH_KEY_ID=${WEBHOOK_AUTH_KEY_ID}
      - TRISA_WEBHOOK_AUTH_KEY_SECRET=${WEBHOOK_AUTH_KEY_SECRET}
