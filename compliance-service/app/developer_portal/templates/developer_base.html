<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>{% block title %}AML+18 – Entwicklerportal{% endblock %}</title>
  <style>
    :root {
      --bg: #f7f8fa; --panel: #ffffff; --text: #1b1f24; --muted: #5b6572;
      --border: #e1e4e8; --accent: #2563eb;
      --accepted: #1a7f37; --review: #b35900; --rejected: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 700; }
    header h1 a { color: inherit; text-decoration: none; }
    header nav { margin-left: auto; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; margin-left: 16px; }
    header nav a:hover { color: var(--accent); }
    main { max-width: 860px; margin: 24px auto; padding: 0 24px 48px; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 24px; margin-bottom: 16px;
    }
    h2 { font-size: 18px; margin: 0 0 12px; }
    h3 { font-size: 15px; margin: 20px 0 8px; }
    p { margin: 0 0 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 12px 0; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    a { color: var(--accent); }
    .muted { color: var(--muted); }
    .lede { font-size: 15px; color: var(--muted); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 4px; }
    label .hint { font-weight: 400; color: var(--muted); }
    input[type=text], input[type=email], input[type=url] {
      width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    button, .btn {
      display: inline-block; margin-top: 16px; padding: 9px 18px; border-radius: 6px; border: none;
      background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; text-decoration: none;
    }
    button:hover, .btn:hover { opacity: 0.9; }
    code { background: #f1f3f5; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    pre {
      background: #12141a; color: #e6e9ef; padding: 14px 16px; border-radius: 8px;
      overflow-x: auto; font-size: 13px; line-height: 1.6;
    }
    pre code { background: none; padding: 0; color: inherit; }
    .warning {
      background: #fff8ec; border: 1px solid #f0d9a6; color: #7a5200;
      border-radius: 8px; padding: 14px 16px; margin: 16px 0; font-size: 14px;
    }
    .error {
      background: #fdecec; border: 1px solid #f2b8b8; color: var(--rejected);
      border-radius: 8px; padding: 12px 14px; margin: 0 0 16px; font-size: 14px;
    }
    .key-box {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 14px;
      background: #12141a; color: #7ee787; padding: 12px 14px; border-radius: 8px;
      word-break: break-all; margin: 8px 0 16px;
    }
    .pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin: 16px 0; }
    .pillar { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .pillar h4 { margin: 0 0 6px; font-size: 14px; }
    .pillar p { margin: 0; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ url_for('developer_portal.landing') }}">AML+18 Entwicklerportal</a></h1>
    <nav>
      <a href="{{ url_for('developer_portal.landing') }}">Übersicht</a>
      <a href="{{ url_for('developer_portal.signup_form') }}">Projekt registrieren</a>
      <a href="{{ url_for('review_ui.list_decisions') }}">Compliance-Officer-Login</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
