<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Compliance Review{% endblock %}</title>
  <style>
    :root {
      --bg: #f7f8fa; --panel: #ffffff; --text: #1b1f24; --muted: #5b6572;
      --border: #e1e4e8; --accent: #2563eb;
      --accepted: #1a7f37; --review: #b35900; --rejected: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text);
    }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 700; }
    header nav a { color: var(--muted); text-decoration: none; font-size: 14px; margin-right: 16px; }
    header nav a:hover { color: var(--accent); }
    main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 16px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    tr:hover td { background: #fafbfc; }
    a { color: var(--accent); }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 12px; font-weight: 600; color: #fff;
    }
    .badge.accepted { background: var(--accepted); }
    .badge.review { background: var(--review); }
    .badge.rejected { background: var(--rejected); }
    .muted { color: var(--muted); }
    .filters { margin-bottom: 12px; font-size: 14px; }
    .filters a {
      margin-right: 10px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); text-decoration: none; color: var(--text);
    }
    .filters a.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    textarea, input[type=text] {
      width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    }
    button {
      margin-top: 12px; padding: 8px 16px; border-radius: 6px; border: none;
      background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    code { background: #f1f3f5; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .kv { display: grid; grid-template-columns: 160px 1fr; gap: 6px 12px; font-size: 14px; }
    .kv dt { color: var(--muted); }
    .kv dd { margin: 0; }
  </style>
</head>
<body>
  <header>
    <h1>Compliance Review</h1>
    <nav>
      <a href="{{ url_for('review_ui.list_decisions') }}">Decisions</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
