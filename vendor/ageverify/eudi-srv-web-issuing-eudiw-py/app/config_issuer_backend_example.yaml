# config_issuer_backend.yaml - COMPLETE CONFIGURATION
# ⚠️ IMPORTANT: This file contains SECRETS - DO NOT commit to git!
# Add to .gitignore: config_issuer_backend.yaml, config_issuer_backend.*.yaml

# ============================================================================
# SERVICE CONFIGURATION
# ============================================================================
service_url: "https://backend.issuer.eudiw.dev"
  
wallet_tester_url: "https://tester.issuer.eudiw.dev"

revocation:
  take_url: "https://issuer.eudiw.dev/token_status_list/take"
  set_url: https://issuer.eudiw.dev/token_status_list/set
  api_key: "secret"  # SECRET
  enabled: true

# ============================================================================
# FRONTEND CONFIGURATION
# ============================================================================
frontend:
  default: "5d725b3c-6d42-448e-8bfd-1eff1fcf152d"
  
  frontends_config:
    "5d725b3c-6d42-448e-8bfd-1eff1fcf152d":
      url: "https://issuer.eudiw.dev"
      metadata_signing_key_path: "/home/pid.issuer/pidprovider/dev/eudi-srv-web-issuing-eudiw-py/app/private/PID-DS-03.key"
      metadata_access_certificate_path: "/home/pid.issuer/pidprovider/dev/eudi-srv-web-issuing-eudiw-py/app/private/PID-DS-03.crt"
      metadata_signing_key_password: null

# ============================================================================
# ISSUER AUTHORIZATION SERVER CONFIGURATION
# ============================================================================

authorization_server:
  base_url: "https://backend.issuer.eudiw.dev/oidc"
  user_verify_endpoint: "https://issuer.eudiw.dev/oidc/verify/user"

# ============================================================================
# EXTERNAL SERVICES CONFIGURATION
# ============================================================================
#verifier url for oid4vp request generation, available at https://github.com/eu-digital-identity-wallet/eudi-srv-verifier-endpoint
dynamic_presentation_url: "https://verifier-backend.eudiw.dev/ui/presentations"

# WUA trust validator url, available at https://github.com/eu-digital-identity-wallet/eudi-srv-trust-validator
trust_validator:  
  url: "https://trust-validator.eudiw.dev/trust"
  enabled: true

# ============================================================================
# SCHEMA CONFIGURATION
# ============================================================================
oid4vp_scheme: "haip-vp://"

credential_offer_scheme: "haip-vci://"

# ============================================================================
# LOGGING
# ============================================================================
logging:
  backend_path: "/tmp/log_prod/logs.log"
  log_level: "INFO"

# ============================================================================
# EXPIRY TIMES (minutes)
# ============================================================================
expiry:
  revocation_code: 60
  form: 60
  session: 60

# ============================================================================
# KEY PATHS
# ============================================================================
keys:
  nonce_path: "/etc/eudiw/pid-issuer-dev/privKey/nonce_rsa2048.pem" # Private key that signs the nonce at the nonce enpoint. 
  credential_request_path: "/etc/eudiw/pid-issuer-dev/privKey/credential_request.pem" # Private key used for credential request encryption. Metadata advertised public key is automatically generated from this private key.

# Path to trusted CA certificates, used to validate VP_Tokens
trusted_CAs_path: "/etc/eudiw/pid-issuer-dev/cert/"

# ============================================================================
# CREDENTIALS AUTHENTICATION METHODS CONFIGURATION
# ============================================================================
credential_auth_methods:
  PID_login:
    - eu.europa.ec.eudi.pseudonym_over18_mdoc
    - eu.europa.ec.eudi.pseudonym_over18_mdoc_deferred_endpoint
    - eu.europa.ec.eudi.por_mdoc
    - eu.europa.ec.eudi.iban_mdoc
    - eu.europa.ec.eudi.hiid_mdoc
    - eu.europa.ec.eudi.tax_mdoc
    - eu.europa.ec.eudi.msisdn_mdoc

  country_selection:
    - eu.europa.ec.eudi.loyalty_mdoc
    - eu.europa.ec.eudi.mdl_mdoc
    - eu.europa.ec.eudi.pid_vc_sd_jwt
    - eu.europa.ec.eudi.pid_mdoc
    - eu.europa.ec.eudi.pseudonym_over18_mdoc
    - eu.europa.ec.eudi.pseudonym_over18_mdoc_deferred_endpoint
    - eu.europa.ec.eudi.photoid
    - eu.europa.ec.eudi.por_mdoc
    - eu.europa.ec.eudi.iban_mdoc
    - eu.europa.ec.eudi.hiid_mdoc
    - eu.europa.ec.eudi.tax_mdoc
    - eu.europa.ec.eudi.msisdn_mdoc
    - eu.europa.ec.eudi.ehic_mdoc
    - eu.europa.ec.eudi.pda1_mdoc
    - eu.europa.ec.eudi.tax_sd_jwt_vc
    - eu.europa.ec.eudi.por_sd_jwt_vc
    - eu.europa.ec.eudi.msisdn_sd_jwt_vc
    - eu.europa.ec.eudi.hiid_sd_jwt_vc
    - eu.europa.ec.eudi.iban_sd_jwt_vc
    - eu.europa.ec.eudi.pseudonym_over18_sd_jwt_vc
    - eu.europa.ec.eudi.cor_mdoc
    - eu.europa.ec.eudi.pda1_sd_jwt_vc
    - eu.europa.ec.eudi.ehic_sd_jwt_vc
    - org.iso.18013.5.1.reservation_mdoc
    - eu.europa.ec.eudi.seafarer_mdoc
    - eu.europa.ec.eudi.diploma_vc_sd_jwt
    - eu.europa.ec.eudi.tax_residency_vc_sd_jwt
    - eu.europa.ec.eudi.employee_mdoc
    - eu.europa.ec.eudi.pid_mdoc_deferred
    - eu.europa.ec.eudi.age_verification_mdoc
    - eu.europa.ec.eudi.age_verification_mdoc_passport
    - eu.europa.ec.eudi.learning_credential_vc_sd_jwt

# ============================================================================
# COUNTRIES CONFIGURATION
# ============================================================================

# Currently only _default is supported for both keys and custom_modifiers
# Eventually keys will be separated by frontend and custom_modifiers per credential_configuration_id
# Connection types supported: oauth or openid

countries:
  EU:
    name: "nodeEU"

    # Keys and certificates
    keys:
      _default:
        private_key_path: "/etc/eudiw/pid-issuer-dev/privKey/PID-DS-0002_EU.pem"
        private_key_password: null 
        certificate_path: "/etc/eudiw/pid-issuer-dev/cert/PID-DS-0002_EU_cert.der"

    supported_credential_ids:
      - "eu.europa.ec.eudi.pid_mdoc"
      - "eu.europa.ec.eudi.pid_vc_sd_jwt"
      - "eu.europa.ec.eudi.pid_mdoc_deferred"
    
    custom_modifiers:
      _default:
        family_name: "CurrentFamilyName"
        given_name: "CurrentGivenName"
        birth_date: "DateOfBirth"
    
    connection_type: "oauth"
    
    auth:
      base_url: "https://eidas.projj.eu"
      redirect_uri: "https://backend.issuer.eudiw.dev/dynamic/redirect"
      scope: "profile"
      response_type: "code"
      client_id: "example"
      client_secret: "example"

